<!DOCTYPE html>
<html>
<head>
  <title>API Load Tester</title>
  <style>
    body { font-family: Arial; padding: 40px; }
    textarea { width: 100%; height: 200px; }
    input { padding: 8px; width: 100px; }
    button { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>🔥 API Load Tester</h2>

  <label>Paste CURL:</label>
  <br>
  <textarea id="curl"></textarea>

  <br><br>

  <label>Number of Requests:</label>
  <input type="number" id="count" value="10" min="1"/>

  <br><br>

  <button onclick="runTest()">Run & Download Logs</button>

  <script>
    async function runTest() {
      const curl = document.getElementById("curl").value;
      const totalRequests = document.getElementById("count").value;

      if (!curl || !totalRequests) {
        alert("Please fill all fields");
        return;
      }

      const response = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ curl, totalRequests })
      });

      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "api_logs.txt";
      a.click();
    }
  </script>

</body>
</html>
